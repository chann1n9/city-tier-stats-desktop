name: Test Aliyun OIDC OSS

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-oss:
    name: Test OSS upload via OIDC
    runs-on: ubuntu-latest

    steps:
      - name: Configure Alibaba Cloud credentials
        uses: aliyun/configure-aliyun-credentials-action@v1
        with:
          role-to-assume: ${{ vars.ALIYUN_ROLE_ARN }}
          oidc-provider-arn: ${{ vars.ALIYUN_OIDC_PROVIDER_ARN }}
          role-session-name: github-actions-city-tier-stats
          audience: sts.aliyuncs.com

      - name: Install ossutil
        run: |
          set -euo pipefail

          curl -L -o ossutil-2.3.0-linux-amd64.zip \
            https://gosspublic.alicdn.com/ossutil/v2/2.3.0/ossutil-2.3.0-linux-amd64.zip

          unzip ossutil-2.3.0-linux-amd64.zip
          chmod +x ossutil-2.3.0-linux-amd64/ossutil
          sudo mv ossutil-2.3.0-linux-amd64/ossutil /usr/local/bin/ossutil

          ossutil version

      - name: Create test latest.json
        run: |
          set -euo pipefail

          cat > latest.json <<EOF
          {
            "version": "0.0.0-oidc-test",
            "releaseDate": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "notes": [
              "GitHub Actions OIDC upload test"
            ],
            "downloads": {
              "test": "${{ vars.DOWNLOAD_BASE_URL }}/latest.json"
            }
          }
          EOF

          cat latest.json

      - name: Upload latest.json to OSS
        run: |
          set -euo pipefail

          ossutil cp -f latest.json "oss://${{ vars.ALIYUN_OSS_BUCKET }}/${{ vars.ALIYUN_OSS_PREFIX }}/latest.json"

      - name: Verify public download URL
        run: |
          set -euo pipefail

          curl -fsSL "${{ vars.DOWNLOAD_BASE_URL }}/latest.json"