<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Eastun Icon - Light Theme</title>
  <desc>A square rounded Eastun app icon with a gold material surface and a dark dimensional E.</desc>

  <defs>
    <linearGradient id="gold-base" x1="196" y1="120" x2="828" y2="904" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF0B8"/>
      <stop offset="0.28" stop-color="#F6C65B"/>
      <stop offset="0.62" stop-color="#D9A326"/>
      <stop offset="1" stop-color="#A96F10"/>
    </linearGradient>

    <radialGradient id="gold-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(294 214) rotate(50) scale(720 520)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="0.35" stop-color="#FFE39A" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="e-fill" x1="320" y1="274" x2="704" y2="750" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2A261D"/>
      <stop offset="0.52" stop-color="#0F0E0B"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>

    <linearGradient id="e-edge" x1="326" y1="276" x2="692" y2="738" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="0.5" stop-color="#FDBC31" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.18"/>
    </linearGradient>

    <filter id="outer-shadow" x="-18%" y="-14%" width="136%" height="142%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="42" stdDeviation="54" flood-color="#6F4308" flood-opacity="0.24"/>
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#FFFFFF" flood-opacity="0.18"/>
    </filter>

    <filter id="e-shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#4A2D08" flood-opacity="0.34"/>
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#FFFFFF" flood-opacity="0.32"/>
    </filter>

    <clipPath id="icon-clip">
      <rect x="104" y="104" width="816" height="816" rx="218"/>
    </clipPath>
  </defs>

  <g id="icon">
    <g id="base" filter="url(#outer-shadow)">
      <rect x="104" y="104" width="816" height="816" rx="218" fill="url(#gold-base)"/>
      <rect x="104" y="104" width="816" height="816" rx="218" fill="url(#gold-glow)"/>
      <rect x="119" y="119" width="786" height="786" rx="203" stroke="#FFF7D7" stroke-opacity="0.56" stroke-width="30"/>
      <g clip-path="url(#icon-clip)">
        <path d="M174 710C310 648 463 654 596 696C715 734 828 706 918 630" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="14" stroke-linecap="round"/>
        <path d="M130 304C272 220 472 198 666 244C776 270 850 256 930 206" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="12" stroke-linecap="round"/>
      </g>
    </g>

    <g id="letter-e" filter="url(#e-shadow)">
      <path
        d="M335 314C335 287.49 356.49 266 383 266H710C736.51 266 758 287.49 758 314V339C758 365.51 736.51 387 710 387H470V459H661C687.51 459 709 480.49 709 507V529C709 555.51 687.51 577 661 577H470V650H717C743.51 650 765 671.49 765 698V724C765 750.51 743.51 772 717 772H383C356.49 772 335 750.51 335 724V314Z"
        fill="url(#e-fill)"
      />
      <path
        d="M383 281H710C728.23 281 743 295.77 743 314V339C743 357.23 728.23 372 710 372H455V474H661C679.23 474 694 488.77 694 507V529C694 547.23 679.23 562 661 562H455V665H717C735.23 665 750 679.77 750 698V724C750 742.23 735.23 757 717 757H383C364.77 757 350 742.23 350 724V314C350 295.77 364.77 281 383 281Z"
        stroke="url(#e-edge)"
        stroke-width="30"
      />
    </g>
  </g>
</svg>
